<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0" />
		<meta
			name="description"
			content="Flipkart landing page clone" />

		<link
			rel="stylesheet"
			href="./style.css" />

		<title>Flipkart Dashboard</title>
	</head>

	<body>
		<div class="header-container">
			<header class="header">
				<div class="header__left">
					<a
						href="/"
						title="Flipkart Logo">
						<svg class="header__logo">
							<use href="./assets/logo.svg"></use>
						</svg>
					</a>

					<div class="header__search">
						<input
							type="search"
							placeholder="Search for products, brands and more ..."
							class="header__search-bar" />

						<svg class="icon--medium header__search-icon">
							<use href="./assets/ui_icons_sprite.svg#search"></use>
						</svg>
					</div>
				</div>

				<div class="header__right">
					<a class="btn btn--primary"><span>Login</span></a>

					<button class="btn btn--secondary btn--flex">
						<span>More</span>

						<span>
							<svg class="icon--small">
								<use
									href="./assets/ui_icons_sprite.svg#chevron-down"></use>
							</svg>
						</span>
					</button>

					<a class="btn btn--secondary btn--flex">
						<span>
							<svg class="icon--medium">
								<use href="./assets/ui_icons_sprite.svg#cart"></use>
							</svg>
						</span>

						<span>Cart</span>
					</a>
				</div>
			</header>
		</div>

		<div class="categories-container">
			<ul class="categories__list">
				<li class="category__item">
					<a
						href="#"
						class="category__link">
						<img
							src="./assets/image.png"
							alt="Category"
							class="category__image" />

						<span class="category__name">Top Offers</span>
					</a>
				</li>

				<li class="category__item">
					<a
						href="#"
						class="category__link">
						<img
							src="./assets/image.png"
							alt="Category"
							class="category__image" />

						<span class="category__name">Grocery</span>
					</a>
				</li>

				<li class="category__item">
					<a
						href="#"
						class="category__link">
						<img
							src="./assets/image.png"
							alt="Category"
							class="category__image" />

						<span class="category__name">Mobiles</span>
					</a>
				</li>

				<li class="category__item">
					<a
						href="#"
						class="category__link">
						<img
							src="./assets/image.png"
							alt="Category"
							class="category__image" />

						<span class="category__name dropdown">Fashion</span>
					</a>
				</li>

				<li class="category__item">
					<a
						href="#"
						class="category__link">
						<img
							src="./assets/image.png"
							alt="Category"
							class="category__image" />

						<span class="category__name dropdown">Electronics</span>
					</a>
				</li>

				<li class="category__item">
					<a
						href="#"
						class="category__link">
						<img
							src="./assets/image.png"
							alt="Category"
							class="category__image" />

						<span class="category__name dropdown">Home</span>
					</a>
				</li>

				<li class="category__item">
					<a
						href="#"
						class="category__link">
						<img
							src="./assets/image.png"
							alt="Category"
							class="category__image" />

						<span class="category__name dropdown">Appliance</span>
					</a>
				</li>

				<li class="category__item">
					<a
						href="#"
						class="category__link">
						<img
							src="./assets/image.png"
							alt="Category"
							class="category__image" />

						<span class="category__name">Travel</span>
					</a>
				</li>

				<li class="category__item">
					<a
						href="#"
						class="category__link">
						<img
							src="./assets/image.png"
							alt="Category"
							class="category__image" />

						<span class="category__name dropdown">Beauty, Toys & More</span>
					</a>
				</li>
			</ul>
		</div>


	</body>
</html>
